services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logicland
      POSTGRES_PASSWORD: logicland
      POSTGRES_DB: logicland
    ports: ["5432:5432"]
    volumes: ["logicland_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logicland"]
      interval: 5s
      retries: 5

  engine:
    build: ./logicland-engine
    env_file: ./logicland-engine/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://logicland:logicland@db:5432/logicland
      CORS_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_ENGINE_URL: http://localhost:8000
      DATABASE_URL: postgresql://logicland:logicland@db:5432/logicland
    ports: ["3000:3000"]
    depends_on: [engine]

volumes:
  logicland_pg:
