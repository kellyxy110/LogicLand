# Render blueprint for the LogicLand Intelligence Engine (FastAPI).
# Deploy: render.com -> New -> Blueprint -> connect kellyxy110/LogicLand.
# Render builds the Docker image in logicland-engine/ and runs uvicorn on $PORT.
services:
  - type: web
    name: logicland-engine
    runtime: docker
    rootDir: logicland-engine
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Allow the deployed web app to call the engine.
      - key: CORS_ORIGINS
        value: https://logicland.vercel.app
      # AI provider (OpenAI-compatible). Set the key in the Render dashboard.
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false # set as a secret in the Render dashboard
